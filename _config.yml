# Site settings
title: Geekend PNW
email: your-email@domain.com
description: > # this means to ignore newlines until "baseurl:"
  A group of RPG gamers in the Pacific Northwest.
baseurl: "" # the subpath of your site, e.g. /blog/
url: "https://www.geekend-pnw.com" # the base hostname & protocol for your site
# twitter_username: jekyllrb
# github_username:  jekyll

# Build settings
markdown: kramdown

plugins:
  - jekyll-redirect-from

whitelist:
  - jekyll-redirect-from

exclude: ['README', 'CNAME', 'Gemfile', 'Gemfile.lock', 'vendor', '.direnv', 'node_modules', '.netlify', 'flake.nix', 'flake.lock']

sass:
  sass_dir: _sass
  style: compressed
  encoding: utf-8

collections:
  events:
    output: true
    permalink: /:collection/:path/
  games:
    output: true
    permalink: /:collection/:path/
  things:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      permalink:
  - scope:
      path: ""
      type: "events"
    values:
      layout: "event"
  - scope:
      path: ""
      type: "games"
    values:
      layout: "game"
  - scope:
      path: ""
      type: "things"
    values:
      layout: "thing"
